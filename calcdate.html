<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DateCalc Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DateCalc">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/180/4f9bbf/ffffff?text=DC">
    <link rel="manifest" href="manifest.json">

    <style>
        :root {
            --bg-color: #e0e5ec;
            --text-main: #2d4857;
            --text-sub: #7a94a4;
            --accent-blue: #4f9bbf;
            --dark-blue: #366982;
            --shadow-light: #ffffff;
            --shadow-dark: #a3b1c6;
            --danger: #ff6b6b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .calculator {
            width: 100%;
            max-width: 450px;
            height: 100%;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom) 20px;
        }

        .display {
            flex: 1.2;
            margin: 15px 0;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 12px 12px 24px var(--shadow-dark), -12px -12px 24px var(--shadow-light);
            display: flex;
            flex-direction: column;
        }

        .area-top, .area-bottom {
            height: 50%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .display-text-top { font-size: 2.6rem; color: var(--text-main); font-weight: 600; letter-spacing: -1px; }
        .display-text-bottom { font-size: 1.8rem; color: var(--text-sub); font-weight: 400; }
        .operator-fixed { position: absolute; left: 10%; font-size: 1.8rem; color: var(--accent-blue); font-weight: 700; }

        .controls { display: flex; gap: 12px; margin-bottom: 15px; width: 100%; }
        .control-btn {
            background: var(--bg-color);
            border-radius: 12px;
            box-shadow: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 600;
            color: var(--text-main);
            height: 55px;
            transition: all 0.2s;
        }

        .control-btn:active { box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light); }
        .unit-selector { flex: 1.5; position: relative; font-size: 0.9rem; }
        .format-toggle { flex: 1.5; color: var(--dark-blue); font-size: 0.8rem; text-align: center; line-height: 1.2; }
        .btn-clear { flex: 0.8; background: var(--danger); color: white; font-weight: 800; font-size: 1.4rem; }

        .unit-selector select { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; -webkit-appearance: none; }

        .keypad { flex: 3.5; display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(5, 1fr); gap: 12px; }
        .btn {
            background: var(--bg-color);
            border-radius: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.6rem;
            font-weight: 600;
            color: var(--text-main);
            box-shadow: 6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light);
            transition: all 0.1s ease;
        }

        .btn:active { box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light); transform: scale(0.96); }
        .btn-accent { background: var(--accent-blue); color: white; }
        .btn-dark { background: var(--dark-blue); color: white; }
        .btn-equal { background: linear-gradient(145deg, #4f9bbf, #366982); color: white; grid-row: span 2; }
        .span-2-col { grid-column: span 2; }
        .span-3-col { grid-column: span 3; font-size: 1.1rem; letter-spacing: 1px; }
        .arrow { font-size: 0.6rem; margin-left: 5px; color: var(--accent-blue); }
    </style>
</head>
<body>

<div class="calculator">
    <div class="display">
        <div class="area-top"><span id="top-display" class="display-text-top"></span></div>
        <div class="area-bottom">
            <span id="op-display" class="operator-fixed"></span>
            <span id="bot-display" class="display-text-bottom"></span>
        </div>
    </div>

    <div class="controls">
        <div class="control-btn unit-selector">
            <span id="unit-label">DAYS <span class="arrow">▼</span></span>
            <select id="unit-select">
                <option value="days">DAYS</option>
                <option value="weeks">WEEKS</option>
                <option value="months">MONTHS</option>
                <option value="years">YEARS</option>
            </select>
        </div>
        <div class="control-btn format-toggle" onclick="toggleFormat()">
            <span id="format-label">FORMAT<br>DD/MM/YYYY</span>
        </div>
        <div class="control-btn btn-clear" onclick="handleInput('C')">C</div>
    </div>

    <div class="keypad">
        <div class="btn" onclick="handleInput('7')">7</div>
        <div class="btn" onclick="handleInput('8')">8</div>
        <div class="btn" onclick="handleInput('9')">9</div>
        <div class="btn btn-dark" onclick="handleInput('back')">←</div>
        <div class="btn" onclick="handleInput('4')">4</div>
        <div class="btn" onclick="handleInput('5')">5</div>
        <div class="btn" onclick="handleInput('6')">6</div>
        <div class="btn btn-dark" onclick="handleInput('+')">+</div>
        <div class="btn" onclick="handleInput('1')">1</div>
        <div class="btn" onclick="handleInput('2')">2</div>
        <div class="btn" onclick="handleInput('3')">3</div>
        <div class="btn btn-dark" onclick="handleInput('-')">−</div>
        <div class="btn span-2-col" onclick="handleInput('0')">0</div>
        <div class="btn" onclick="handleInput('/')">/</div>
        <div class="btn btn-equal" onclick="calculate()">=</div>
        <div class="btn span-3-col btn-accent" id="btn-today" onclick="handleInput('today')">TODAY</div>
    </div>
</div>

<script>
    let currentFormat = 'EU'; 
    let topVal = ""; let botVal = ""; let currentOp = ""; 
    let isTypingBottom = false; let isResult = false;

    const topDisp = document.getElementById('top-display');
    const botDisp = document.getElementById('bot-display');
    const opDisp = document.getElementById('op-display');
    const formatLbl = document.getElementById('format-label');

    function formatDate(date) {
        const d = String(date.getDate()).padStart(2, '0');
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const y = date.getFullYear();
        return currentFormat === 'EU' ? `${d}/${m}/${y}` : `${m}/${d}/${y}`;
    }

    function parseDate(str) {
        const p = str.split('/');
        if (p.length !== 3) return new Date(NaN);
        
        let d, m, y;
        if (currentFormat === 'EU') { 
            d = parseInt(p[0]); 
            m = parseInt(p[1]) - 1; 
        } else { 
            m = parseInt(p[0]) - 1; 
            d = parseInt(p[1]); 
        }
        y = parseInt(p[2]);
        if (p[2].length === 2) y += 2000;

        // Controllo range base per evitare overflow assurdi
        if (m < 0 || m > 11 || d < 1 || d > 31 || y < 100) return new Date(NaN);

        const testDate = new Date(y, m, d);
        
        // Controllo di coerenza: se inserisco 31/04, Date() crea 01/05. 
        // Se i componenti estratti non sono uguali agli originali, la data è falsa.
        if (testDate.getFullYear() !== y || 
            testDate.getMonth() !== m || 
            testDate.getDate() !== d) {
            return new Date(NaN);
        }
        
        return testDate;
    }

    function toggleFormat() {
        if (topVal.includes('/')) {
            const d = parseDate(topVal);
            currentFormat = (currentFormat === 'EU') ? 'US' : 'EU';
            if (!isNaN(d.getTime())) topVal = formatDate(d);
        } else {
            currentFormat = (currentFormat === 'EU') ? 'US' : 'EU';
        }
        botVal = ""; 
        formatLbl.innerHTML = currentFormat === 'EU' ? "FORMAT<br>DD/MM/YYYY" : "FORMAT<br>MM/DD/YYYY";
        updateUI();
    }

    function updateUI() { topDisp.innerText = topVal; botDisp.innerText = botVal; opDisp.innerText = currentOp; }

    function handleInput(key) {
        if (isResult && !['+','-','back','C'].includes(key)) { topVal = ""; botVal = ""; currentOp = ""; isTypingBottom = false; isResult = false; }
        if (key === 'C') { topVal = ""; botVal = ""; currentOp = ""; isTypingBottom = false; isResult = false; }
        else if (key === 'back') {
            if (isTypingBottom) { botVal = botVal.slice(0,-1); if(!botVal){isTypingBottom=false; currentOp="";}}
            else topVal = topVal.slice(0,-1);
            isResult = false;
        }
        else if (key === '+' || key === '-') { if(topVal!==""){ currentOp = key; botVal = ""; isTypingBottom = true; isResult = false; }}
        else if (key === 'today') { const t = formatDate(new Date()); if(isTypingBottom) botVal = t; else topVal = t; }
        else {
            if (isTypingBottom) botVal += key;
            else topVal += key;
        }
        updateUI();
    }

    function calculate() {
        if (!topVal || !botVal) return;
        const d1 = parseDate(topVal);
        const unit = document.getElementById('unit-select').value;
        
        if (isNaN(d1.getTime())) { alert("Invalid Start Date"); return; }

        if (botVal.includes('/')) {
            const d2 = parseDate(botVal);
            if (isNaN(d2.getTime())) { alert("Invalid Second Date"); return; }
            let diff = (d1 - d2) / 86400000;
            if (currentOp === '+') diff = (d1.getTime() + d2.getTime()) / 86400000;
            if (unit === 'weeks') diff /= 7; if (unit === 'months') diff /= 30.44; if (unit === 'years') diff /= 365.25;
            topVal = parseFloat(Math.abs(diff).toFixed(2)).toString();
        } else {
            let num = parseFloat(botVal); if (isNaN(num)) return;
            if (currentOp === '-') num = -num;
            let res = new Date(d1);
            if (unit === 'days') res.setDate(res.getDate() + num);
            else if (unit === 'weeks') res.setDate(res.getDate() + num * 7);
            else if (unit === 'months') res.setMonth(res.getMonth() + num);
            else if (unit === 'years') res.setFullYear(res.getFullYear() + num);
            topVal = formatDate(res);
        }
        botVal = ""; currentOp = ""; isTypingBottom = false; isResult = true;
        updateUI();
    }

    document.getElementById('unit-select').addEventListener('change', (e) => {
        document.getElementById('unit-label').innerHTML = e.target.value.toUpperCase() + ' <span class="arrow">▼</span>';
    });

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js').catch(()=>{}); });
    }
</script>
</body>
</html>
